version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: newzlet_db
    restart: always
    environment:
      POSTGRES_DB: newzlet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: newzlet_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newzlet_backend
    restart: always
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/newzlet
      - DB_SSL_REQUIRE=False
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
    volumes:
      # Optional: mount backend folder to enable hot-reloading in local development
      # (Note: gunicorn will need restart if python files change, or use runserver for dev)
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newzlet_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      # Mount frontend code for live-reloading
      - ./frontend:/app
      - /app/node_modules # prevent overwriting container node_modules
    depends_on:
      - backend

volumes:
  pgdata:
