<!doctype html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title data-rh="true">The Daily Newzlet - Your Daily News Roundup</title>
  <meta name="description"
    content="The Daily Newzlet aggregates breaking news across technology, politics, sports, business, and entertainment, updated automatically every morning." data-rh="true" />
  <meta name="keywords"
    content="news, daily news, breaking news, technology news, politics news, sports news, business news, international news, news aggregator" />
  <meta name="robots" content="index, follow, max-image-preview:large" data-rh="true" />
  <link rel="canonical" href="https://newzlet.me/" data-rh="true" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="The Daily Newzlet" />
  <meta property="og:title" content="The Daily Newzlet - Your Daily News Roundup" />
  <meta property="og:description"
    content="Categorized breaking news across technology, politics, sports, business, international affairs, medical, and entertainment." />
  <meta property="og:url" content="https://newzlet.me/" />
  <meta property="og:image" content="https://newzlet.me/og-image.png" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Daily Newzlet - Your Daily News Roundup" />
  <meta name="twitter:description"
    content="Categorized breaking news across technology, politics, sports, business, international affairs, medical, and entertainment." />
  <meta name="twitter:image" content="https://newzlet.me/og-image.png" />
  <meta name="author" content="Gaurav Sethi">

  <meta name="theme-color" content="#FFFFFF" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="google-site-verification" content="MkzyZISSVKFpppFCK7jOclGgRO_JAZpYD4Q1OiWcN7E" />

  <!-- Image Proxy Preconnect -->
  <link rel="preconnect" href="https://wsrv.nl" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsMediaOrganization",
    "name": "The Daily Newzlet",
    "url": "https://newzlet.me/",
    "logo": "https://newzlet.me/logo.png"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "The Daily Newzlet",
    "url": "https://newzlet.me/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://newzlet.me/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>

<body class="app-container">
  <div id="root">
    <!-- Visually hidden H1 for SEO bots parsing raw HTML. Replaced by React on mount. -->
    <h1 style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;">
      The Daily Newzlet
    </h1>
  </div>
  <script type="module" src="/src/main.jsx"></script>
  <noscript>The Daily Newzlet requires JavaScript to display the latest news.</noscript>
</body>

</html>
